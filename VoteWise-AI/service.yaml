apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: votewise-ai
  labels:
    cloud.googleapis.com/location: us-central1
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
    spec:
      containers:
      - image: gcr.io/votewise-ai-494717/votewise-ai
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi
        env:
        - name: VITE_GEMINI_API_KEY
          value: "YOUR_API_KEY_HERE"
